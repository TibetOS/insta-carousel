name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          GZIP_SIZE=$(find dist -name '*.js' -exec gzip -c {} \; | wc -c)
          echo "Gzipped JS size: $((GZIP_SIZE / 1024))KB"
          if [ $GZIP_SIZE -gt 307200 ]; then
            echo "::error::Bundle exceeds 300KB gzipped limit"
            exit 1
          fi
